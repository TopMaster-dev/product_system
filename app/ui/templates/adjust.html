{% extends "base.html" %}
{% block title %}手動調整{% endblock %}
{% block content %}
<h1 class="text-2xl font-semibold mb-4">手動在庫調整</h1>

<form method="post" action="/admin/adjust" class="bg-white shadow rounded p-5 max-w-2xl space-y-4">
  <div>
    <label class="block text-sm font-medium text-slate-700 mb-1">マスターSKU</label>
    <select name="master_sku_id" required class="w-full border rounded px-3 py-2 text-sm">
      <option value="">選択してください</option>
      {% for s in master_skus %}
        <option value="{{ s.id }}" {% if preselect == s.id %}selected{% endif %}>
          {{ s.sku_code }} &mdash; {{ s.name }} (現在: {{ s.on_hand_qty }})
        </option>
      {% endfor %}
    </select>
  </div>
  <div class="grid grid-cols-2 gap-3">
    <div>
      <label class="block text-sm font-medium text-slate-700 mb-1">調整数 (正/負)</label>
      <input name="quantity_delta" type="number" required class="w-full border rounded px-3 py-2 text-sm" />
      <div class="text-xs text-slate-500 mt-1">+5 で増加、-3 で減少</div>
    </div>
    <div>
      <label class="block text-sm font-medium text-slate-700 mb-1">理由</label>
      <input name="reason" required maxlength="255" class="w-full border rounded px-3 py-2 text-sm"
             placeholder="棚卸 / 破損 / 検品差異 など" />
    </div>
  </div>
  <div class="rounded bg-slate-100 px-3 py-2 text-xs text-slate-600">
    操作者: <span class="font-mono">{{ operator }}</span> として記録されます。
  </div>
  <div class="flex justify-end gap-2 pt-2">
    <a href="/admin/inventory" class="text-sm px-4 py-2">キャンセル</a>
    <button class="rounded bg-[#1F3A68] text-white text-sm px-4 py-2">調整を適用</button>
  </div>
</form>
{% endblock %}
