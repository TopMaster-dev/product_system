{% extends "base.html" %}
{% block title %}新規マッピング · Product System{% endblock %}
{% block content %}

<div class="mb-5">
  <a href="/admin/mappings" class="inline-flex items-center gap-1 text-sm text-ink-500 hover:text-ink-800 transition mb-2 font-medium">
    <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
    マッピング一覧に戻る
  </a>
  <h1 class="text-xl sm:text-2xl font-semibold tracking-tight text-ink-900">新規マッピング</h1>
  <p class="text-sm text-ink-500 mt-1">マスター SKU とチャネル SKU の対応を登録します</p>
</div>

<form method="post" action="/admin/mappings/new"
      class="bg-white rounded-xl border border-ink-200 p-5 sm:p-6 max-w-2xl space-y-5">

  <div>
    <label class="block text-sm font-medium text-ink-700 mb-1.5">マスター SKU <span class="text-red-500">*</span></label>
    <select name="master_sku_id" required
            class="w-full px-3 py-2.5 border border-ink-300 rounded-md text-sm bg-white focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none transition">
      <option value="">— 選択してください —</option>
      {% for s in master_skus %}
        <option value="{{ s.id }}">{{ s.sku_code }} — {{ s.name }}</option>
      {% endfor %}
    </select>
  </div>

  <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
    <div>
      <label class="block text-sm font-medium text-ink-700 mb-1.5">チャネル <span class="text-red-500">*</span></label>
      <select name="channel" required
              class="w-full px-3 py-2.5 border border-ink-300 rounded-md text-sm bg-white focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none transition">
        <option value="rakuten">rakuten</option>
        <option value="shopify">shopify</option>
        <option value="amazon">amazon</option>
        <option value="wholesale">wholesale</option>
      </select>
    </div>
    <div>
      <label class="block text-sm font-medium text-ink-700 mb-1.5">マーケットプレイス</label>
      <input name="marketplace_id" placeholder="任意 (Amazon JP/US/…)"
             class="w-full px-3 py-2.5 border border-ink-300 rounded-md text-sm focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none transition" />
    </div>
  </div>

  <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
    <div>
      <label class="block text-sm font-medium text-ink-700 mb-1.5">チャネル SKU <span class="text-red-500">*</span></label>
      <input name="channel_sku" required
             class="w-full px-3 py-2.5 border border-ink-300 rounded-md text-sm font-mono focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none transition" />
    </div>
    <div>
      <label class="block text-sm font-medium text-ink-700 mb-1.5">チャネル 商品ID</label>
      <input name="channel_product_id" placeholder="任意"
             class="w-full px-3 py-2.5 border border-ink-300 rounded-md text-sm font-mono focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none transition" />
    </div>
  </div>

  <div class="flex flex-col sm:flex-row sm:justify-end gap-2 pt-4 border-t border-ink-100">
    <a href="/admin/mappings"
       class="inline-flex items-center justify-center rounded-md border border-ink-300 bg-white text-ink-700 text-sm font-medium px-5 py-2 hover:bg-ink-50 transition">
      キャンセル
    </a>
    <button class="inline-flex items-center justify-center rounded-md bg-brand-600 hover:bg-brand-700 text-white text-sm font-medium px-5 py-2 transition">
      登録
    </button>
  </div>
</form>
{% endblock %}
