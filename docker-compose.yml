services:
  db:
    image: postgres:15-alpine
    container_name: product_system_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: product_system
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d product_system"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: product_system_app
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: local
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/product_system
      DATABASE_URL_SYNC: postgresql+psycopg2://postgres:postgres@db:5432/product_system
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
      - ./alembic:/app/alembic
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  db_data:
